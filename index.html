<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FY25 倍樂生台北支社 支出實績報告</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #7B8FC4; --blue-light: #E8EDF8; --blue-mid: #A8B8D8; --blue-dark: #4A5A8C;
    --green: #6EB898; --green-light: #E0F2EA; --green-mid: #A8D4BE; --green-dark: #2E6650;
    --amber: #C89848; --amber-light: #FAF0DC; --amber-mid: #E8C878;
    --red: #C07888; --red-light: #FAE8EC;
    --gray: #8A8880; --gray-light: #F4F0EC; --gray-mid: #C8C0B8;
    --bg: #ffffff; --bg2: #FBF8F5; --bg3: #F4EFF0;
    --text: #2C2830; --text2: #6A6068; --text3: #A09098;
    --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.14);
    --radius: 8px; --radius-lg: 12px;
  }
  body { font-family: 'Noto Sans TC', 'PingFang TC', sans-serif; background: var(--bg2); color: var(--text); font-size: 14px; line-height: 1.6; }
  .page { max-width: 1100px; margin: 0 auto; padding: 20px 16px 40px; }

  /* Header */
  .header { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
  .header-title h1 { font-size: 18px; font-weight: 600; color: var(--text); }
  .header-title p { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn { font-size: 12px; padding: 6px 12px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); cursor: pointer; transition: background 0.15s; white-space: nowrap; }
  .btn:hover { background: var(--bg2); }
  .btn.primary { background: var(--blue); color: #fff; border-color: var(--blue); }
  .btn.primary:hover { background: var(--blue-dark); }
  .upload-label { font-size: 12px; padding: 6px 12px; border: 0.5px solid var(--blue); border-radius: var(--radius); background: var(--blue-light); color: var(--blue-dark); cursor: pointer; transition: background 0.15s; white-space: nowrap; }
  .upload-label:hover { background: #cce0f5; }
  #uploadInput { display: none; }

  /* KPI Cards */
  .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 14px; }
  .kpi-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 18px; }
  .kpi-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .kpi-month { font-weight: 700; color: var(--text); }
  .kpi-num { font-size: 22px; font-weight: 600; color: var(--text); line-height: 1.2; }
  .kpi-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

  /* Section card */
  .section { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 14px; }
  .section-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .section-title .badge { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 999px; background: var(--bg3); color: var(--text2); }

  /* Monthly chart */
  .chart-wrap { position: relative; height: 200px; }

  /* Donut + Bar split */
  .viz-split { display: grid; grid-template-columns: 260px 1fr; gap: 20px; align-items: start; }
  @media (max-width: 700px) { .viz-split { grid-template-columns: 1fr; } }

  /* Donut */
  .donut-wrap { display: flex; flex-direction: column; gap: 10px; }
  .donut-chart-wrap { position: relative; height: 160px; }
  .cat-filter-select { width: 100%; font-size: 12px; padding: 6px 8px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); cursor: pointer; }
  .legend-list { display: flex; flex-direction: column; gap: 4px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer; padding: 3px 6px; border-radius: 4px; transition: background 0.1s; }
  .legend-item:hover { background: var(--bg2); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-pct { margin-left: auto; color: var(--text3); font-size: 11px; }

  /* View toggle */
  .view-toggle { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .vtbtn { font-size: 12px; padding: 5px 12px; border: 1.5px solid var(--border2); border-radius: 999px; background: var(--bg); color: var(--text2); cursor: pointer; transition: all 0.15s; }
  .vtbtn.active-annual { background: #E8EDF8; color: #4A5A8C; border-color: #A8B8D8; }
  .vtbtn.active-ap { background: #E0F2EA; color: #2E6650; border-color: #A8D4BE; }
  .vtbtn.active-prepay { background: #FAF0DC; color: #7A5820; border-color: #E8C878; }
  .vtbtn.active-x { background: #EAE8F4; color: #4A4878; border-color: #C9B8D8; }
  .vtbtn.active-writeoff { background: #FAE8EC; color: #884058; border-color: #E8A0A8; }
  .vtbtn.inactive { opacity: 0.4; }

  /* Vendor bar chart */
  .vendor-bar-wrap { margin-bottom: 4px; }
  .vbar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; cursor: pointer; }
  .vbar-name { font-size: 12px; color: var(--text); width: 130px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .vbar-track { flex: 1; height: 18px; background: var(--bg3); border-radius: 3px; overflow: hidden; display: flex; }
  .vbar-seg { height: 100%; transition: width 0.3s; }
  .vbar-val { font-size: 11px; font-weight: 500; color: var(--text); width: 60px; text-align: right; flex-shrink: 0; }

  /* Vendor cards */
  .vendor-list { display: flex; flex-direction: column; gap: 5px; }
  .vendor-card { border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: border-color 0.15s; }
  .vendor-card.expanded { border-color: var(--blue-mid); }
  .vendor-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 14px; cursor: pointer; background: var(--bg); transition: background 0.1s; }
  .vendor-header:hover { background: var(--bg2); }
  .vendor-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .vendor-name.negative { color: var(--red); }
  .vendor-tag { font-size: 10px; padding: 1px 7px; border-radius: 999px; background: var(--blue-light); color: var(--blue-dark); margin-left: 6px; }
  .vendor-right { display: flex; align-items: center; gap: 10px; }
  .vendor-amount { font-size: 13px; font-weight: 600; color: var(--text); }
  .vendor-amount.negative { color: var(--red); }
  .expand-icon { font-size: 10px; color: var(--text3); }
  .vendor-body { display: none; background: var(--bg2); border-top: 0.5px solid var(--border); padding: 10px 14px; }
  .vendor-body.open { display: block; }
  .vendor-nums { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 8px; }
  .vnum-item .vnum-label { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
  .vnum-item .vnum-val { font-size: 14px; font-weight: 600; }
  .vnum-item .vnum-val.blue { color: var(--blue-dark); }
  .vnum-item .vnum-val.green { color: var(--green-dark); }
  .vnum-item .vnum-val.amber { color: var(--amber); }
  .vnum-item .vnum-val.red { color: var(--red); }
  .vendor-note { font-size: 11px; color: var(--text2); background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 6px 10px; margin-top: 6px; }
  .show-more-btn { width: 100%; padding: 8px; font-size: 12px; color: var(--blue); background: var(--blue-light); border: none; border-radius: var(--radius); cursor: pointer; margin-top: 8px; }
  .show-more-btn:hover { background: #cce0f5; }

  /* Memo */
  .memo-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .memo-body { margin-top: 10px; display: none; }
  .memo-body.open { display: block; }
  .memo-textarea { width: 100%; min-height: 80px; font-size: 13px; padding: 8px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); resize: vertical; font-family: inherit; color: var(--text); background: var(--bg); }
  .memo-hint { font-size: 11px; color: var(--text3); text-align: right; margin-top: 4px; }

  .sep { border: none; border-top: 0.5px solid var(--border); margin: 12px 0; }
  .no-print { }
  @media print { .no-print { display: none !important; } body { background: white; } .page { padding: 0; } }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="header no-print">
    <div class="header-title">
      <h1>FY25 倍樂生台北支社　支出實績報告</h1>
      <p id="headerSub">會計年度 2025/04 ～ 2026/03　|　最新月份：<strong id="latestMonthLabel">2026/03</strong></p>
    </div>
    <div class="toolbar">
      <label class="upload-label" for="uploadInput">&#8593; 上傳 Excel 更新</label>
      <input type="file" id="uploadInput" accept=".xlsx,.xlsm">
      <button class="btn" onclick="saveHTML()">另存 HTML</button>
      <button class="btn" onclick="window.print()">另存 PDF</button>
    </div>
  </div>

  <!-- KPI CARDS -->
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-label">FY25 累計總支出</div>
      <div class="kpi-num" id="kpiTotal">—</div>
      <div class="kpi-sub">2025/04 ～ 2026/03 全年</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">當月應付　<span class="kpi-month" id="kpiApMonth">2026/03</span></div>
      <div class="kpi-num" id="kpiAp">—</div>
      <div class="kpi-sub" id="kpiApPct">佔累計 —%</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">當月預付　<span class="kpi-month" id="kpiPreMonth">2026/03</span></div>
      <div class="kpi-num" id="kpiPre">—</div>
      <div class="kpi-sub" id="kpiPrePct">佔累計 —%</div>
    </div>
  </div>

  <!-- ZONE 3: Monthly trend -->
  <div class="section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
      <div class="section-title" style="margin-bottom:0;">年度月份走勢 <span class="badge">★年度</span></div>
      <div class="view-toggle" style="margin-bottom:0;">
        <button class="vtbtn active-ap"      id="mBtnAp"       onclick="toggleMonthView('ap')">應付</button>
        <button class="vtbtn active-prepay"  id="mBtnPrepay"   onclick="toggleMonthView('prepay')">預付</button>
        <button class="vtbtn active-x"       id="mBtnX"        onclick="toggleMonthView('x')">-</button>
        <button class="vtbtn active-writeoff" id="mBtnWriteoff" onclick="toggleMonthView('writeoff')">沖銷</button>
      </div>
    </div>
    <div class="chart-wrap">
      <canvas id="monthlyChart"></canvas>
    </div>
  </div>

  <!-- ZONE 4: Donut + Bar -->
  <div class="section">
    <div class="section-title">業務類別佔比 ＆ 廠商支出排行</div>
    <div class="viz-split">

      <!-- Donut -->
      <div class="donut-wrap">
        <div style="font-size:11px;color:var(--text3);margin-bottom:4px;">點擊扇區篩選廠商</div>
        <div class="donut-chart-wrap">
          <canvas id="donutChart"></canvas>
        </div>
        <div id="catActiveBar" style="display:none;margin-top:6px;">
          <div style="display:flex;align-items:center;justify-content:space-between;background:var(--blue-light);border-radius:var(--radius);padding:5px 10px;">
            <span style="font-size:12px;color:var(--blue-dark);">篩選中：<strong id="catActiveLabel"></strong></span>
            <button onclick="clearCatFilter()" style="font-size:11px;color:var(--blue-dark);background:none;border:none;cursor:pointer;padding:0;">✕ 清除</button>
          </div>
        </div>
        <div class="legend-list" id="donutLegend"></div>
      </div>

      <!-- Bar side -->
      <div>
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:6px;">
          <div class="view-toggle" style="margin-bottom:0;">
            <button class="vtbtn active-annual" id="btnAnnual" onclick="toggleView('annual')">年度累計</button>
            <button class="vtbtn" id="btnAp" onclick="toggleView('ap')">當月應付</button>
            <button class="vtbtn" id="btnPrepay" onclick="toggleView('prepay')">當月預付</button>
          </div>
          <button class="btn" id="barsCollapseBtn" onclick="collapseToTop10()" style="display:none;font-size:11px;padding:4px 10px;">縮合至 Top 10 ↑</button>
        </div>
        <div class="vendor-bar-wrap" id="vendorBars"></div>
        <button class="show-more-btn" id="barsShowMore" onclick="showMoreBars()">顯示第 11 ～ 20 筆 ▼</button>
      </div>
    </div>
  </div>

  <!-- ZONE 5: Vendor search -->
  <div class="section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
      <div class="section-title" style="margin-bottom:0;">廠商查詢 <span class="badge" id="searchResultCount"></span></div>
      <button class="btn" id="collapseTopBtn" onclick="collapseToTop10()" style="display:none;">縮合至 Top 10 ↑</button>
    </div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:14px;">
      <input type="text" id="vendorSearch" placeholder="輸入廠商名稱關鍵字搜尋（模糊比對）..." oninput="onVendorSearch()" style="flex:1;font-size:13px;padding:7px 12px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);">
      <button class="btn" onclick="clearSearch()">清除</button>
    </div>
    <div id="searchBarArea" style="display:none;margin-bottom:14px;">
      <div class="view-toggle" id="searchViewToggle">
        <button class="vtbtn active-annual" id="sBtnAnnual" onclick="toggleSearchView('annual')">年度累計</button>
        <button class="vtbtn" id="sBtnAp" onclick="toggleSearchView('ap')">當月應付</button>
        <button class="vtbtn" id="sBtnPrepay" onclick="toggleSearchView('prepay')">當月預付</button>
      </div>
      <div id="searchBars"></div>
    </div>
    <div class="vendor-list" id="searchCards"></div>
    <div id="searchEmpty" style="display:none;text-align:center;padding:24px;font-size:13px;color:var(--text3);">未找到符合的廠商</div>
  </div>

  <!-- ZONE 6: Memo -->
  <div class="section">
    <div class="memo-header" onclick="toggleMemo()">
      <span class="section-title" style="margin-bottom:0;">會議紀錄</span>
      <span id="memoToggleIcon" style="font-size:12px; color:var(--text3);">▶ 展開</span>
    </div>
    <div class="memo-body" id="memoBody">
      <textarea class="memo-textarea" id="memoText" placeholder="輸入會議記錄，另存 HTML 時一併保留..."></textarea>
      <div class="memo-hint">輸入後另存 HTML 即自動保存</div>
    </div>
  </div>

</div>

<script>
const CAT_COLORS = {
  '舞台劇':    { bg:'#C9B8D8', light:'#F0EAF8', dark:'#5A3878' },
  'IT系統':    { bg:'#A8C8D8', light:'#E4F2F8', dark:'#2A5870' },
  '商品採購':  { bg:'#F4B8A8', light:'#FDF0EC', dark:'#884030' },
  '行銷投放':  { bg:'#E8A0A8', light:'#FCE8EC', dark:'#803848' },
  '物流倉儲':  { bg:'#A8D4BE', light:'#E0F4EC', dark:'#2E6050' },
  '人事福利':  { bg:'#A8C8D8', light:'#E4F2F8', dark:'#2A5070' },
  '財務法務':  { bg:'#F0D898', light:'#FDF4DC', dark:'#806020' },
  '辦公室費用':{ bg:'#C8C0B8', light:'#F4F0EC', dark:'#504840' },
  '其他':      { bg:'#C8C0C8', light:'#F4F0F4', dark:'#504850' },
};

let DB = null;
let activeViews = { annual: true, ap: false, prepay: false };
let catFilter = '';
let barsShown = 10;
let cardsShown = 10;
let monthlyChartInst = null;
let donutChartInst = null;
let monthViews = { ap: true, prepay: true, x: true, writeoff: true };

function fmt(n) {
  if (n === null || n === undefined) return '—';
  return Math.round(n).toLocaleString('zh-TW');
}
function fmtWan(n) {
  if (!n) return '0';
  const w = Math.round(n / 10000);
  return w.toLocaleString('zh-TW') + '萬';
}

function rocToAD(roc) {
  const p = roc.split('/');
  return (parseInt(p[0]) + 1911) + '/' + p[1];
}

function parseExcel(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array' });

      // ★年度 sheet
      const wsYr = wb.Sheets['★年度'];
      if (!wsYr) { alert('找不到「★年度」工作表'); return; }
      const yrData = XLSX.utils.sheet_to_json(wsYr, { header: 1, defval: null });

      // Find header row with months
      let monthRow = null;
      for (let i = 0; i < yrData.length; i++) {
        const r = yrData[i];
        if (r && r[2] && typeof r[2] === 'string' && r[2].includes('/')) {
          monthRow = i; break;
        }
      }
      if (monthRow === null) { alert('無法解析★年度工作表'); return; }

      const months = yrData[monthRow].slice(2, 14).filter(Boolean);
      let apRow = null, preRow = null, totalRow = null, xRow = null, writeoffRow = null;
      for (let i = monthRow + 1; i < yrData.length; i++) {
        const label = String(yrData[i][1] || '').trim();
        if (label === '應付') apRow = yrData[i].slice(2, 14);
        if (label === '預付') preRow = yrData[i].slice(2, 14);
        if (label === '沖銷') writeoffRow = yrData[i].slice(2, 14);
        if (label === 'Ｘ' || label === 'X') xRow = yrData[i].slice(2, 14);
        if (label === '總計') { totalRow = yrData[i].slice(2, 14); break; }
      }

      const monthly = months.map((m, idx) => ({
        month_roc: m,
        month_ad: rocToAD(m),
        ap: apRow ? (apRow[idx] || 0) : 0,
        prepay: preRow ? (preRow[idx] || 0) : 0,
        writeoff: writeoffRow ? (writeoffRow[idx] || 0) : 0,
        x: xRow ? (xRow[idx] || 0) : 0,
        total: totalRow ? (totalRow[idx] || 0) : 0
      }));

      // ★說明頁 sheet
      const wsSp = wb.Sheets['★說明頁(樞紐)'];
      if (!wsSp) { alert('找不到「★說明頁(樞紐)」工作表'); return; }
      const spData = XLSX.utils.sheet_to_json(wsSp, { header: 1, defval: null });

      // Build AP and prepay lookups
      const apLookup = {}, preLookup = {}, preNoteLookup = {};
      for (let i = 7; i < spData.length; i++) {
        const row = spData[i];
        if (row[6] && row[6] !== '總計') apLookup[String(row[6]).trim()] = row[7] || 0;
        if (row[11] && row[11] !== '總計') {
          preLookup[String(row[11]).trim()] = row[12] || 0;
          if (row[13]) preNoteLookup[String(row[11]).trim()] = String(row[13]);
        }
      }

      const vendors = [];
      for (let i = 7; i < spData.length; i++) {
        const row = spData[i];
        const biz = row[0], vendor = row[1], cum = row[2];
        if (vendor && String(vendor).trim() !== '総計' && String(vendor).trim() !== '總計' && cum !== null) {
          const v = String(vendor).trim();
          vendors.push({
            business: biz ? String(biz).trim() : '',
            vendor: v,
            cumulative: cum,
            ap: apLookup[v] || 0,
            prepay: preLookup[v] || 0,
            note: preNoteLookup[v] || '',
            category: categorize(biz ? String(biz) : '')
          });
        }
      }

      const latestMonth = monthly[monthly.length - 1];
      DB = {
        monthly,
        vendors,
        latest_month_ad: latestMonth.month_ad,
        total_cumulative: vendors.reduce((s, v) => s + v.cumulative, 0),
        total_ap: latestMonth.ap,
        total_prepay: latestMonth.prepay
      };
      barsShown = 10; catFilter = ''; activeViews = { annual: true, ap: false, prepay: false }; searchViews = { annual: true, ap: false, prepay: false }; monthViews = { ap: true, prepay: true, x: true, writeoff: true };
      clearSearch();
      updateCatActiveBar();
      renderAll();
      alert('資料更新成功！');
    } catch(err) {
      alert('解析失敗：' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function categorize(b) {
  if (!b) return '人事福利';
  if (/社員/.test(b)) return '人事福利';
  if (/舞台劇|劇團|年代售票|娛樂稅|偶師|樂園/.test(b)) return '舞台劇';
  if (/KOL|FB|IG|廣告|行銷|社群|SHOPLINE|Mirafeel|代操|宣傳|BCL|[Aa][Pp][Pp]|EDM|網路代操|程瑋/.test(b)) return '行銷投放';
  if (/電話系統|EVOX/.test(b)) return '辦公室費用';
  if (/機票/.test(b)) return '其他';
  if (/印刷|貼紙|紙箱|完稿|繪圖|影像|攝影|配音|打字|橋樑書|電子書|數位典藏|錄音/.test(b)) return '商品採購';
  if (/[Dd][Bb]2|[Ee][Rr][Pp]|[Cc][Rr][Mm]|IDC|軟體|系統|資訊|網路|[Ff]irewall|SSL|CDP|[Ss]uper\s*8|LINE|Atlassian|KingswaySoft|Adobe/.test(b)) return 'IT系統';
  if (/倉庫|物流|報關|貨運|快遞|郵局|黑貓|港務/.test(b)) return '物流倉儲';
  if (/勞工保險|健保|員工保險|員工健檢|福委|研修/.test(b)) return '人事福利';
  if (/國稅|稅捐|會計|律師/.test(b)) return '財務法務';
  if (/租賃|房東|辦公室|水電|清潔|保全|空調|事務機/.test(b)) return '辦公室費用';
  if (/經銷商|授權|教具|玩具|商品|禮物|即享券|條碼|檢驗|益生菌|pixsee|Pixsee|支社往來/.test(b)) return '商品採購';
  return '其他';
}

function renderMonthlyChart() {
  const labels = DB.monthly.map(m => m.month_ad.replace('20', "'"));
  const apData = DB.monthly.map(m => m.ap || 0);
  const preData = DB.monthly.map(m => m.prepay || 0);
  const xData = DB.monthly.map(m => m.x || 0);
  const writeoffData = DB.monthly.map(m => m.writeoff || 0);
  const totalData = DB.monthly.map(m => m.total || 0);

  const totalLabelPlugin = {
    id: 'totalLabels',
    afterDatasetsDraw(chart) {
      const { ctx, data, scales: { x, y } } = chart;
      ctx.save();
      ctx.font = '500 11px sans-serif';
      ctx.fillStyle = '#444441';
      ctx.textAlign = 'center';
      data.labels.forEach((label, i) => {
        const positiveSum =
          (monthViews.ap ? (apData[i]||0) : 0) +
          (monthViews.prepay ? (preData[i]||0) : 0) +
          (monthViews.x ? (xData[i]||0) : 0);
        const xPos = x.getPixelForValue(i);
        const yPos = y.getPixelForValue(positiveSum) - 6;
        if (totalData[i] !== 0) ctx.fillText((totalData[i]/10000).toFixed(0)+'萬', xPos, yPos);
      });
      ctx.restore();
    }
  };

  const datasets = [];
  if (monthViews.ap)       datasets.push({ label: '應付', data: apData,      backgroundColor: '#A8D4BE', stack: 'a' });
  if (monthViews.prepay)   datasets.push({ label: '預付', data: preData,      backgroundColor: '#F4B8A8', stack: 'a' });
  if (monthViews.x)        datasets.push({ label: '-',    data: xData,        backgroundColor: '#C9B8D8', stack: 'a' });
  if (monthViews.writeoff) datasets.push({ label: '沖銷', data: writeoffData, backgroundColor: '#E8A0A8', stack: 'a' });

  const ctx = document.getElementById('monthlyChart').getContext('2d');
  if (monthlyChartInst) monthlyChartInst.destroy();
  monthlyChartInst = new Chart(ctx, {
    type: 'bar',
    plugins: [totalLabelPlugin],
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top', labels: { font: { size: 11 }, boxWidth: 12 } },
        tooltip: {
          callbacks: {
            afterBody: (items) => {
              const idx = items[0].dataIndex;
              return ['─────────────', '月總計：$' + fmt(totalData[idx])];
            }
          }
        }
      },
      scales: {
        x: { stacked: true, ticks: { font: { size: 11 } } },
        y: { stacked: true, ticks: { font: { size: 11 }, callback: v => (v/10000).toFixed(0) + '萬' } }
      }
    }
  });
}

function toggleMonthView(type) {
  const only = monthViews[type] && !Object.entries(monthViews).some(([k,v]) => k !== type && v);
  if (!only) monthViews[type] = !monthViews[type];
  if (!Object.values(monthViews).some(Boolean)) monthViews[type] = true;

  const btnId = { ap: 'mBtnAp', prepay: 'mBtnPrepay', x: 'mBtnX', writeoff: 'mBtnWriteoff' };
  const activeClass = { ap: 'active-ap', prepay: 'active-prepay', x: 'active-x', writeoff: 'active-writeoff' };
  Object.keys(monthViews).forEach(key => {
    const btn = document.getElementById(btnId[key]);
    btn.className = 'vtbtn' + (monthViews[key] ? ' ' + activeClass[key] : ' inactive');
  });
  renderMonthlyChart();
}

function updateCatActiveBar() {

function getFilteredVendors() {
  return catFilter ? DB.vendors.filter(v => v.category === catFilter) : DB.vendors;
}

function getSortValue(v) {
  let total = 0;
  if (activeViews.annual) total += v.cumulative;
  if (activeViews.ap) total += v.ap;
  if (activeViews.prepay) total += v.prepay;
  return total;
}

function renderDonut() {
  const vendors = getFilteredVendors();
  const catTotals = {};
  vendors.forEach(v => {
    catTotals[v.category] = (catTotals[v.category] || 0) + v.cumulative;
  });
  const sorted = Object.entries(catTotals).sort((a,b) => b[1]-a[1]);
  const total = sorted.reduce((s, [,v]) => s + v, 0);

  const labels = sorted.map(([k]) => k);
  const data = sorted.map(([,v]) => v);
  const bgColors = labels.map(l => {
    const c = CAT_COLORS[l] || CAT_COLORS['其他'];
    return (catFilter === l) ? c.bg : (catFilter ? c.bg + '99' : c.bg);
  });
  const borderWidths = labels.map(l => catFilter === l ? 3 : 1);
  const borderColors = labels.map(l => catFilter === l ? '#fff' : '#fff');

  const ctx = document.getElementById('donutChart').getContext('2d');
  if (donutChartInst) donutChartInst.destroy();
  donutChartInst = new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: bgColors, borderWidth: borderWidths, borderColor: borderColors, hoverOffset: 6 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      cutout: '60%',
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: (item) => item.label + ': $' + fmt(item.raw) + ' (' + (item.raw/total*100).toFixed(1) + '%)' } }
      },
      onClick: (e, elements) => {
        if (elements.length > 0) {
          const cat = labels[elements[0].index];
          applyCatFilter(catFilter === cat ? '' : cat);
        }
      }
    }
  });

  // Legend
  const legendEl = document.getElementById('donutLegend');
  legendEl.innerHTML = '';
  sorted.forEach(([cat, val]) => {
    const c = CAT_COLORS[cat] || CAT_COLORS['其他'];
    const pct = (val / total * 100).toFixed(1);
    const isActive = catFilter === cat;
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.style.background = isActive ? c.light : '';
    item.style.fontWeight = isActive ? '500' : '';
    item.innerHTML = `<div class="legend-dot" style="background:${c.bg};${isActive ? 'width:12px;height:12px;' : ''}"></div><span>${cat}</span><span class="legend-pct">${pct}%</span>`;
    item.onclick = () => applyCatFilter(catFilter === cat ? '' : cat);
    legendEl.appendChild(item);
  });
}

function toggleView(type) {
  const allActive = activeViews.annual && activeViews.ap && activeViews.prepay;
  const justThis = activeViews[type] && !Object.entries(activeViews).some(([k,v]) => k !== type && v);

  if (justThis) {
    // Can't deselect all — keep this one
  } else if (type === 'annual' && (activeViews.ap || activeViews.prepay)) {
    // annual + another: will be parallel — allowed
    activeViews[type] = !activeViews[type];
  } else {
    activeViews[type] = !activeViews[type];
  }
  if (!activeViews.annual && !activeViews.ap && !activeViews.prepay) activeViews[type] = true;

  // Update button styles
  document.getElementById('btnAnnual').className = 'vtbtn' + (activeViews.annual ? ' active-annual' : '');
  document.getElementById('btnAp').className = 'vtbtn' + (activeViews.ap ? ' active-ap' : '');
  document.getElementById('btnPrepay').className = 'vtbtn' + (activeViews.prepay ? ' active-prepay' : '');

  barsShown = 10;
}

function isParallelMode() {
  return activeViews.annual && (activeViews.ap || activeViews.prepay);
}

function renderVendorBars() {
  const vendors = getFilteredVendors().slice();
  vendors.sort((a, b) => getSortValue(b) - getSortValue(a));
  const shown = vendors.slice(0, barsShown);
  const maxVal = Math.max(...shown.map(v => getSortValue(v)), 1);
  const parallel = isParallelMode();

  const wrap = document.getElementById('vendorBars');
  wrap.innerHTML = '';

  shown.forEach(v => {
    const row = document.createElement('div');
    row.className = 'vbar-row';

    const name = document.createElement('div');
    name.className = 'vbar-name';
    name.textContent = v.vendor;
    name.title = v.vendor;

    const track = document.createElement('div');
    track.className = 'vbar-track';
    track.style.flexDirection = 'column';
    track.style.height = parallel ? '36px' : '18px';

    if (parallel) {
      // Sub-rows for each active type
      const types = [
        { key: 'annual', val: v.cumulative, color: '#A8B8D8', label: '累計' },
        { key: 'ap', val: v.ap, color: '#A8D4BE', label: '應付' },
        { key: 'prepay', val: v.prepay, color: '#F4B8A8', label: '預付' },
      ].filter(t => activeViews[t.key]);

      types.forEach(t => {
        const subRow = document.createElement('div');
        subRow.style.cssText = 'display:flex;align-items:center;flex:1;';
        const seg = document.createElement('div');
        seg.style.cssText = `height:10px;border-radius:2px;background:${t.color};width:${Math.max((t.val/maxVal)*100,0)}%;transition:width 0.3s;`;
        subRow.appendChild(seg);
        track.appendChild(subRow);
      });
    } else {
      // Stacked (ap + prepay only)
      const totalW = getSortValue(v);
      const pct = totalW / maxVal * 100;
      if (activeViews.ap && activeViews.prepay && !activeViews.annual) {
        const apW = v.ap / maxVal * 100;
        const preW = v.prepay / maxVal * 100;
        const s1 = document.createElement('div'); s1.className = 'vbar-seg'; s1.style.width = apW + '%'; s1.style.background = '#A8D4BE';
        const s2 = document.createElement('div'); s2.className = 'vbar-seg'; s2.style.width = preW + '%'; s2.style.background = '#F4B8A8';
        track.appendChild(s1); track.appendChild(s2);
      } else {
        const color = activeViews.annual ? '#A8B8D8' : activeViews.ap ? '#A8D4BE' : '#F4B8A8';
        const seg = document.createElement('div'); seg.className = 'vbar-seg'; seg.style.width = pct + '%'; seg.style.background = color;
        track.appendChild(seg);
      }
    }

    const val = document.createElement('div');
    val.className = 'vbar-val';
    val.textContent = fmtWan(getSortValue(v));

    row.appendChild(name); row.appendChild(track); row.appendChild(val);
    row.onclick = () => scrollToVendorCard(v.vendor);
    wrap.appendChild(row);
  });

  const btn = document.getElementById('barsShowMore');
  const colBtn = document.getElementById('barsCollapseBtn');
  if (barsShown >= vendors.length) {
    btn.style.display = 'none';
  } else {
    btn.style.display = 'block';
    const next = Math.min(barsShown + 10, vendors.length);
    btn.textContent = `顯示第 ${barsShown + 1} ～ ${next} 筆 ▼`;
  }
  colBtn.style.display = barsShown > 10 ? 'block' : 'none';
}

function showMoreBars() {
  barsShown += 10;
  renderVendorBars();
}

function collapseToTop10() {
  barsShown = 10;
  renderVendorBars();

      </div>
      <div class="vendor-right">

    </div>
    <div class="vendor-body">
      <div class="vendor-nums">

          <div class="vnum-label">年度累計</div>
          <div class="vnum-val ${isNeg?'red':'blue'}">$${fmt(v.cumulative)}</div>
        </div>

        </div>

        </div>

    </div>`;

function getSearchSortValue(v) {
  let t = 0;
  if (searchViews.annual) t += v.cumulative;
  if (searchViews.ap) t += v.ap;
  if (searchViews.prepay) t += v.prepay;
  return t;
}

function toggleSearchView(type) {
  const only = searchViews[type] && !Object.entries(searchViews).some(([k,val]) => k !== type && val);
  if (!only) searchViews[type] = !searchViews[type];
  if (!searchViews.annual && !searchViews.ap && !searchViews.prepay) searchViews[type] = true;
  document.getElementById('sBtnAnnual').className = 'vtbtn' + (searchViews.annual ? ' active-annual' : '');
  document.getElementById('sBtnAp').className = 'vtbtn' + (searchViews.ap ? ' active-ap' : '');
  document.getElementById('sBtnPrepay').className = 'vtbtn' + (searchViews.prepay ? ' active-prepay' : '');
  onVendorSearch();
}

function isSearchParallel() {
  return searchViews.annual && (searchViews.ap || searchViews.prepay);
}

function onVendorSearch() {
  const q = document.getElementById('vendorSearch').value.trim();
  const barArea = document.getElementById('searchBarArea');
  const cards = document.getElementById('searchCards');
  const empty = document.getElementById('searchEmpty');
  const countBadge = document.getElementById('searchResultCount');

  if (!q) {
    barArea.style.display = 'none';
    cards.innerHTML = '';
    empty.style.display = 'none';
    countBadge.textContent = '';
    return;
  }

  const results = DB.vendors.filter(v =>
    v.vendor.includes(q) || v.business.includes(q)
  ).slice().sort((a, b) => getSearchSortValue(b) - getSearchSortValue(a));

  countBadge.textContent = results.length + ' 筆';

  if (results.length === 0) {
    barArea.style.display = 'none';
    cards.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  barArea.style.display = 'block';

  // Render bars
  const barsEl = document.getElementById('searchBars');
  barsEl.innerHTML = '';
  const maxVal = Math.max(...results.map(v => Math.abs(getSearchSortValue(v))), 1);
  const parallel = isSearchParallel();

  results.forEach(v => {
    const row = document.createElement('div');
    row.className = 'vbar-row';
    row.style.cursor = 'default';

    const name = document.createElement('div');
    name.className = 'vbar-name';
    name.textContent = v.vendor;
    name.title = v.vendor;

    const track = document.createElement('div');
    track.className = 'vbar-track';
    track.style.flexDirection = 'column';
    track.style.height = parallel ? '36px' : '18px';

    if (parallel) {
      const types = [
        { key: 'annual', val: v.cumulative, color: '#A8B8D8' },
        { key: 'ap', val: v.ap, color: '#A8D4BE' },
        { key: 'prepay', val: v.prepay, color: '#F4B8A8' },
      ].filter(t => searchViews[t.key]);
      types.forEach(t => {
        const subRow = document.createElement('div');
        subRow.style.cssText = 'display:flex;align-items:center;flex:1;';
        const seg = document.createElement('div');
        seg.style.cssText = `height:10px;border-radius:2px;background:${t.color};width:${Math.max((Math.abs(t.val)/maxVal)*100,0)}%;transition:width 0.3s;`;
        subRow.appendChild(seg);
        track.appendChild(subRow);
      });
    } else {
      if (searchViews.ap && searchViews.prepay && !searchViews.annual) {
        const apW = v.ap / maxVal * 100;
        const preW = v.prepay / maxVal * 100;
        const s1 = document.createElement('div'); s1.className = 'vbar-seg'; s1.style.width = apW + '%'; s1.style.background = '#A8D4BE';
        const s2 = document.createElement('div'); s2.className = 'vbar-seg'; s2.style.width = preW + '%'; s2.style.background = '#F4B8A8';
        track.appendChild(s1); track.appendChild(s2);
      } else {
        const color = searchViews.annual ? '#A8B8D8' : searchViews.ap ? '#A8D4BE' : '#F4B8A8';
        const pct = Math.abs(getSearchSortValue(v)) / maxVal * 100;
        const seg = document.createElement('div'); seg.className = 'vbar-seg'; seg.style.width = pct + '%'; seg.style.background = color;
        track.appendChild(seg);
      }
    }

    const val = document.createElement('div');
    val.className = 'vbar-val';
    const sv = getSearchSortValue(v);
    val.textContent = sv < 0 ? '-' + fmtWan(Math.abs(sv)) : fmtWan(sv);
    if (sv < 0) val.style.color = 'var(--red)';

    row.appendChild(name); row.appendChild(track); row.appendChild(val);
    barsEl.appendChild(row);
  });

  // Render cards (auto-expand since it's a search result)
  cards.innerHTML = '';
  results.forEach(v => {
    const card = buildVendorCard(v);
    const body = card.querySelector('.vendor-body');
    const icon = card.querySelector('.expand-icon');
    body.classList.add('open');
    card.classList.add('expanded');
    icon.textContent = '▼';
    cards.appendChild(card);
  });
}

function saveHTML() {
  const memo = document.getElementById('memoText').value;
  const clone = document.documentElement.cloneNode(true);
  // Embed memo
  clone.querySelector('#memoText').value = memo;
  // Mark memo open if has content
  if (memo) {
    clone.querySelector('#memoBody').classList.add('open');
    clone.querySelector('#memoToggleIcon').textContent = '▼ 收合';
  }
  // Embed current DB as JSON
  const script = clone.ownerDocument.createElement('script');
  script.textContent = `window.__SAVED_DB__ = ${JSON.stringify(DB)};`;
  clone.querySelector('head').appendChild(script);

  const blob = new Blob(['<!DOCTYPE html>' + clone.outerHTML], { type: 'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `FY25_倍樂生支出報告_${DB.latest_month_ad.replace('/','')}.html`;
  a.click();
}
